<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📐 GeoQuest – Geometria Klasa 4</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0d2b;
  --card: #16163a;
  --card2: #1e1e4a;
  --border: rgba(255,255,255,0.1);
  --yellow: #ffd700;
  --pink: #ff6eb4;
  --teal: #26e5d5;
  --purple: #a78bfa;
  --green: #34d399;
  --red: #f87171;
  --white: #f0f0ff;
  --dim: rgba(240,240,255,0.55);
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Baloo 2', cursive;
  background: var(--bg);
  color: var(--white);
  min-height: 100vh;
  overflow-x: hidden;
}
body::before {
  content:'';
  position:fixed; inset:0;
  background-image:
    linear-gradient(rgba(167,139,250,.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(167,139,250,.05) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events:none; z-index:0;
}
.shapes-bg { position:fixed; inset:0; pointer-events:none; overflow:hidden; z-index:0; }
.shape {
  position:absolute; opacity:.07;
  animation: floatUp linear infinite;
}
@keyframes floatUp {
  from { transform: translateY(110vh) rotate(0deg); }
  to   { transform: translateY(-20vh) rotate(720deg); }
}
.screen {
  position:relative; z-index:1;
  min-height:100vh;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  padding:20px 16px;
}
.screen.hidden { display:none!important; }

/* ========== START SCREEN ========== */
.start-logo {
  font-size:4rem;
  margin-bottom:6px;
  animation: bounce 2s ease-in-out infinite;
}
@keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
.start-title {
  font-family:'Fredoka One',cursive;
  font-size: clamp(2.8rem,9vw,5.5rem);
  text-align:center;
  background: linear-gradient(135deg, var(--yellow), var(--pink), var(--teal));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  background-clip:text;
  margin-bottom:6px;
  animation: glow 3s ease-in-out infinite;
}
@keyframes glow { 0%,100%{filter:brightness(1)} 50%{filter:brightness(1.25)} }
.start-sub {
  font-size:1rem; color:var(--dim); text-align:center; margin-bottom:28px;
}
.topics-grid {
  display:grid;
  grid-template-columns: repeat(3,1fr);
  gap:10px; max-width:560px; width:100%;
  margin-bottom:26px;
}
@media(max-width:420px){ .topics-grid{grid-template-columns:repeat(2,1fr);} }
.topic-chip {
  background:var(--card2);
  border:1px solid var(--border);
  border-radius:18px;
  padding:14px 8px;
  text-align:center; font-size:.85rem; font-weight:700;
  transition:.2s;
}
.topic-chip:hover { transform:scale(1.05); border-color:var(--purple); }
.topic-chip .t-icon { font-size:1.8rem; display:block; margin-bottom:4px; }
.info-row {
  display:flex; gap:12px; flex-wrap:wrap; justify-content:center;
  margin-bottom:30px;
}
.info-badge {
  background:var(--card2); border:1px solid var(--border);
  border-radius:20px; padding:7px 14px; font-size:.88rem; font-weight:600;
}
.btn-start {
  font-family:'Baloo 2',cursive;
  font-size:1.3rem; font-weight:800;
  padding:16px 52px;
  background: linear-gradient(135deg,#7c5cbf,#e94560);
  border:none; border-radius:50px; color:#fff;
  cursor:pointer;
  box-shadow:0 8px 30px rgba(124,92,191,.5);
  transition:.25s;
  animation: btnPulse 2.5s ease-in-out infinite;
}
@keyframes btnPulse {
  0%,100%{box-shadow:0 8px 30px rgba(124,92,191,.5)}
  50%{box-shadow:0 10px 40px rgba(233,69,96,.75)}
}
.btn-start:hover { transform:scale(1.06) translateY(-3px); }

/* ========== GAME HEADER ========== */
.game-header {
  width:100%; max-width:720px;
  display:flex; align-items:center; gap:12px;
  margin-bottom:16px;
}
.score-box {
  display:flex; align-items:center; gap:5px;
  background:var(--card2); border:1px solid var(--border);
  border-radius:30px; padding:7px 14px;
  font-weight:800; font-size:1.05rem; white-space:nowrap;
  min-width:80px;
}
.score-box .si { font-size:1.1rem; }
.prog-wrap { flex:1; }
.prog-label {
  font-size:.75rem; color:var(--dim);
  display:flex; justify-content:space-between; margin-bottom:4px;
}
.prog-bar {
  height:11px; background:var(--card2);
  border-radius:10px; overflow:hidden;
  border:1px solid var(--border);
}
.prog-fill {
  height:100%;
  background:linear-gradient(90deg,var(--purple),var(--pink),var(--yellow));
  border-radius:10px;
  transition:width .55s cubic-bezier(.34,1.56,.64,1);
  box-shadow:0 0 10px rgba(167,139,250,.5);
}
.streak-box {
  background:linear-gradient(135deg,var(--yellow),#ff9500);
  border-radius:30px; padding:7px 12px;
  font-weight:800; font-size:.9rem; color:#1a0000;
  white-space:nowrap; min-width:60px; text-align:center;
}

/* ========== QUESTION CARD ========== */
.qcard {
  width:100%; max-width:720px;
  background:var(--card); border:1px solid var(--border);
  border-radius:24px; padding:26px;
  margin-bottom:16px;
  animation: cardIn .4s cubic-bezier(.34,1.56,.64,1);
}
@keyframes cardIn {
  from { opacity:0; transform:scale(.9) translateY(18px); }
  to   { opacity:1; transform:scale(1) translateY(0); }
}
.qcard-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }
.cat-badge {
  display:inline-flex; align-items:center; gap:5px;
  background:var(--card2); border:1px solid rgba(167,139,250,.3);
  border-radius:20px; padding:4px 12px;
  font-size:.8rem; font-weight:700; color:var(--purple);
}
.q-num { font-size:.8rem; color:var(--dim); }
.q-text {
  font-size:1.1rem; font-weight:600; line-height:1.65;
  white-space:pre-line; margin-bottom:20px;
}
.canvas-wrap {
  display:flex; justify-content:center; margin-bottom:18px;
}
.canvas-wrap canvas {
  border-radius:14px; background:#0a0a1e;
  border:1px solid var(--border);
  max-width:100%; height:auto;
}

/* choices */
.opts-grid {
  display:grid; grid-template-columns:1fr 1fr; gap:11px;
}
@media(max-width:460px){ .opts-grid{grid-template-columns:1fr;} }
.opt-btn {
  background:var(--card2); border:2px solid var(--border);
  border-radius:16px; padding:13px 14px;
  text-align:left; font-family:'Baloo 2',cursive;
  font-size:.98rem; font-weight:600; color:var(--white);
  cursor:pointer; transition:.18s;
  display:flex; align-items:center; gap:10px;
  line-height:1.3;
}
.opt-btn:hover:not(:disabled) {
  background:#2a2a5a; border-color:var(--purple);
  transform:translateY(-2px);
  box-shadow:0 4px 14px rgba(167,139,250,.3);
}
.opt-btn.correct { background:rgba(52,211,153,.18); border-color:var(--green); color:var(--green); animation:pop .45s cubic-bezier(.34,1.56,.64,1); }
.opt-btn.wrong   { background:rgba(248,113,113,.18); border-color:var(--red);   color:var(--red);   animation:shake .4s; }
@keyframes pop   { 0%{transform:scale(1)} 50%{transform:scale(1.05)} 100%{transform:scale(1)} }
@keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)} }
.opt-letter {
  display:inline-flex; align-items:center; justify-content:center;
  width:28px; height:28px;
  background:rgba(167,139,250,.2); border-radius:8px;
  font-size:.82rem; font-weight:800; flex-shrink:0;
}

/* true/false */
.tf-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
.tf-btn {
  padding:18px; border-radius:18px; border:2px solid var(--border);
  background:var(--card2); font-family:'Baloo 2',cursive;
  font-size:1.2rem; font-weight:800; cursor:pointer; transition:.18s; color:var(--white);
}
.tf-btn:hover:not(:disabled) { transform:translateY(-3px); box-shadow:0 8px 20px rgba(0,0,0,.3); }
.tf-btn.tbtn:hover:not(:disabled){ background:rgba(52,211,153,.18); border-color:var(--green); }
.tf-btn.fbtn:hover:not(:disabled){ background:rgba(248,113,113,.18); border-color:var(--red); }
.tf-btn.correct { background:rgba(52,211,153,.2); border-color:var(--green); color:var(--green); }
.tf-btn.wrong   { background:rgba(248,113,113,.2); border-color:var(--red);   color:var(--red);   animation:shake .4s; }

/* input */
.inp-row { display:flex; gap:10px; align-items:center; }
.ans-inp {
  flex:1; background:var(--card2); border:2px solid var(--border);
  border-radius:14px; padding:13px 16px;
  font-family:'Baloo 2',cursive; font-size:1.25rem; font-weight:700;
  color:var(--white); outline:none; transition:.18s;
}
.ans-inp:focus { border-color:var(--purple); box-shadow:0 0 0 3px rgba(167,139,250,.2); }
.ans-inp.correct { border-color:var(--green); background:rgba(52,211,153,.1); }
.ans-inp.wrong   { border-color:var(--red);   background:rgba(248,113,113,.1); animation:shake .4s; }
.unit-lbl { font-size:1rem; font-weight:700; color:var(--dim); }
.btn-check {
  background:linear-gradient(135deg,var(--purple),var(--pink));
  border:none; border-radius:12px; padding:13px 20px;
  font-family:'Baloo 2',cursive; font-size:.98rem; font-weight:800;
  color:#fff; cursor:pointer; transition:.18s; white-space:nowrap;
}
.btn-check:hover { transform:scale(1.05); }

/* feedback */
.fb-box {
  margin-top:14px; padding:13px 16px; border-radius:14px;
  font-size:.93rem; line-height:1.5; display:none;
  animation:fadeUp .3s ease;
}
@keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
.fb-box.correct { background:rgba(52,211,153,.13); border:1px solid rgba(52,211,153,.4); color:var(--green); }
.fb-box.wrong   { background:rgba(248,113,113,.13); border:1px solid rgba(248,113,113,.4); color:#fca5a5; }
.fb-title { font-size:1.05rem; font-weight:800; margin-bottom:4px; }

/* next button */
.btn-next {
  width:100%; max-width:720px;
  background:linear-gradient(135deg,#7c5cbf,#e94560);
  border:none; border-radius:18px; padding:15px;
  font-family:'Baloo 2',cursive; font-size:1.2rem; font-weight:800;
  color:#fff; cursor:pointer; transition:.28s;
  box-shadow:0 6px 20px rgba(124,92,191,.4);
  display:none; animation:fadeUp .3s ease;
}
.btn-next:hover { transform:translateY(-3px); box-shadow:0 10px 30px rgba(233,69,96,.5); }

/* ========== RESULTS ========== */
.res-card {
  background:var(--card); border:1px solid var(--border);
  border-radius:30px; padding:36px 30px;
  text-align:center; max-width:560px; width:100%;
  animation:cardIn .55s cubic-bezier(.34,1.56,.64,1);
}
.res-trophy { font-size:4.5rem; margin-bottom:8px; animation:trophySpin .8s cubic-bezier(.34,1.56,.64,1); }
@keyframes trophySpin { from{transform:scale(0) rotate(-180deg)} to{transform:scale(1) rotate(0)} }
.res-title {
  font-family:'Fredoka One',cursive; font-size:2.3rem;
  background:linear-gradient(135deg,var(--yellow),var(--pink));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  margin-bottom:6px;
}
.stars { font-size:2.2rem; margin:14px 0; letter-spacing:4px; }
.score-big { font-family:'Fredoka One',cursive; font-size:3.5rem; color:var(--yellow); margin-bottom:20px; }
.res-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:22px; }
.res-cell { background:var(--card2); border-radius:14px; padding:13px 8px; }
.res-cell .rn { font-size:1.7rem; font-weight:800; }
.res-cell .rl { font-size:.78rem; color:var(--dim); margin-top:2px; }
.res-msg { margin-bottom:22px; color:var(--dim); font-size:.92rem; line-height:1.5; }
.btn-again {
  background:linear-gradient(135deg,var(--teal),var(--purple));
  border:none; border-radius:50px; padding:13px 38px;
  font-family:'Baloo 2',cursive; font-size:1.15rem; font-weight:800; color:#fff;
  cursor:pointer; transition:.28s; box-shadow:0 6px 20px rgba(38,229,213,.4);
}
.btn-again:hover { transform:scale(1.05) translateY(-3px); }

/* confetti */
.cf { position:fixed; pointer-events:none; z-index:9999; border-radius:2px; animation:cfFall 1.4s ease-in forwards; }
@keyframes cfFall { 0%{transform:translateY(-60px) rotate(0deg);opacity:1} 100%{transform:translateY(110vh) rotate(720deg);opacity:0} }
</style>
</head>
<body>

<div class="shapes-bg" id="shapesBg"></div>

<!-- ===== START ===== -->
<div class="screen" id="startScreen">
  <div class="start-logo">📐</div>
  <div class="start-title">GeoQuest</div>
  <div class="start-sub">Klasa 4 Szkoły Podstawowej · Geometria</div>

  <div class="topics-grid">
    <div class="topic-chip"><span class="t-icon">📍</span>Punkty</div>
    <div class="topic-chip"><span class="t-icon">📐</span>Proste</div>
    <div class="topic-chip"><span class="t-icon">📏</span>Odcinki</div>
    <div class="topic-chip"><span class="t-icon">⊥</span>Prostopadłe</div>
    <div class="topic-chip"><span class="t-icon">∥</span>Równoległe</div>
    <div class="topic-chip"><span class="t-icon">🧠</span>Logiczne</div>
  </div>

  <div class="info-row">
    <div class="info-badge">❓ 40 pytań</div>
    <div class="info-badge">🎨 Rysunki</div>
    <div class="info-badge">⭐ Punkty &amp; Pasy</div>
    <div class="info-badge">🏆 Rankingi gwiazd</div>
  </div>

  <button class="btn-start" onclick="startGame()">🚀 ZACZYNAMY!</button>
</div>

<!-- ===== GAME ===== -->
<div class="screen hidden" id="gameScreen">
  <div class="game-header">
    <div class="score-box"><span class="si">⭐</span><span id="scoreDisp">0</span></div>
    <div class="prog-wrap">
      <div class="prog-label"><span>Postęp</span><span id="progLbl">0/40</span></div>
      <div class="prog-bar"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
    </div>
    <div class="streak-box" id="streakBox">🔥 0</div>
  </div>

  <div class="qcard" id="qcard">
    <div class="qcard-top">
      <span class="cat-badge" id="catBadge">📍 Punkty</span>
      <span class="q-num" id="qNum">1/40</span>
    </div>
    <div class="q-text" id="qText"></div>
    <div class="canvas-wrap" id="canvasWrap" style="display:none">
      <canvas id="qCanvas" width="500" height="260"></canvas>
    </div>
    <div id="answersArea"></div>
    <div class="fb-box" id="fbBox">
      <div class="fb-title" id="fbTitle"></div>
      <div id="fbText"></div>
    </div>
  </div>

  <button class="btn-next" id="btnNext" onclick="nextQ()">Następne pytanie ➡️</button>
</div>

<!-- ===== RESULTS ===== -->
<div class="screen hidden" id="resultsScreen">
  <div class="res-card">
    <div class="res-trophy" id="resTrophy">🏆</div>
    <div class="res-title" id="resTitle">Mistrz Geometrii!</div>
    <div class="stars" id="resStars">⭐⭐⭐</div>
    <div class="score-big" id="resBigScore">0 pkt</div>
    <div class="res-grid">
      <div class="res-cell"><div class="rn" style="color:var(--green)" id="resCorrect">0</div><div class="rl">✅ Dobrze</div></div>
      <div class="res-cell"><div class="rn" style="color:var(--red)"   id="resWrong">0</div><div class="rl">❌ Źle</div></div>
      <div class="res-cell"><div class="rn" style="color:var(--yellow)" id="resAcc">0%</div><div class="rl">🎯 Celność</div></div>
    </div>
    <div class="res-msg" id="resMsg"></div>
    <button class="btn-again" onclick="restartGame()">🔄 Zagraj ponownie!</button>
  </div>
</div>

<script>
// ============================================================
// QUESTION DATABASE – 40 pytań
// ============================================================
const QS = [
  // ─── PUNKTY ───
  { cat:"📍 Punkty", type:"choice",
    q:"Jak oznaczamy punkty na rysunkach geometrycznych?",
    opts:["Małymi literami (a, b, c)","Dużymi literami (A, B, C)","Cyframi arabskimi (1, 2, 3)","Symbolem × lub •"],
    ans:1, exp:"Punkty oznaczamy DUŻYMI literami, np. A, B, C, D." },

  { cat:"📍 Punkty", type:"choice",
    q:"Ile punktów wyznacza dokładnie jedną prostą?",
    opts:["1 punkt","2 punkty","3 punkty","4 punkty"],
    ans:1, exp:"Przez dowolne 2 różne punkty można poprowadzić DOKŁADNIE JEDNĄ prostą!" },

  { cat:"📍 Punkty", type:"truefalse",
    q:"Przez jeden punkt można poprowadzić wiele różnych prostych.",
    ans:true, exp:"TAK! Przez jeden punkt przechodzi nieskończenie wiele prostych. Dopiero dwa punkty wyznaczają dokładnie jedną prostą." },

  { cat:"📍 Punkty", type:"choice",
    q:"Ile prostych można poprowadzić przez 3 punkty, które NIE leżą na jednej prostej?",
    opts:["1 prostą","2 proste","3 proste","6 prostych"],
    ans:2, exp:"Przez każde 2 z 3 punktów przechodzimy 1 prostą. Mamy 3 pary punktów = 3 proste." },

  // ─── PROSTE ───
  { cat:"📐 Proste", type:"choice",
    q:"Co jest prawdą o prostej?",
    opts:["Ma określoną długość","Ma dwa końce","Jest nieskończona w obu kierunkach","Zawsze jest pozioma lub pionowa"],
    ans:2, exp:"Prosta jest nieskończona – nie ma początku ani końca, rozciąga się w obu kierunkach bez ograniczeń." },

  { cat:"📐 Proste", type:"truefalse",
    q:"Półprosta (promień) ma jeden koniec i jest nieskończona w jednym kierunku.",
    ans:true, exp:"TAK! Półprosta ma punkt początku i rozciąga się w jednym kierunku bez końca." },

  { cat:"📐 Proste", type:"choice",
    q:"Ile wspólnych punktów mogą mieć dwie RÓŻNE proste na płaszczyźnie?",
    opts:["Zawsze 0","Zawsze 1","0 lub 1","1 lub 2"],
    ans:2, exp:"Dwie różne proste są albo równoległe (0 punktów wspólnych) albo się przecinają (1 punkt wspólny)." },

  { cat:"📐 Proste", type:"choice",
    q:"Prosta, odcinek i półprosta – co je łączy?",
    opts:["Wszystkie mają określoną długość","Wszystkie mają dwa końce","Wszystkie są fragmentami linii prostej","Wszystkie są nieskończone"],
    ans:2, exp:"Prosta, odcinek i półprosta to różne fragmenty linii prostej – różnią się tym, czy mają końce." },

  // ─── ODCINKI ───
  { cat:"📏 Odcinki", type:"choice",
    q:"Co to jest odcinek?",
    opts:["Nieskończona linia prosta","Część prostej ograniczona dwoma punktami","Linia krzywa między dwoma punktami","Punkt na prostej"],
    ans:1, exp:"Odcinek to część prostej ograniczona dwoma punktami – jego końcami." },

  { cat:"📏 Odcinki", type:"input",
    q:"Odcinek AB = 8 cm, odcinek BC = 5 cm.\nPunkt B leży między A i C na tej samej prostej.\nIle wynosi odcinek AC?",
    ans:"13", unit:"cm", exp:"AC = AB + BC = 8 + 5 = 13 cm" },

  { cat:"📏 Odcinki", type:"input",
    q:"Odcinek PQ = 20 cm. Punkt M leży dokładnie w połowie PQ.\nIle wynosi odcinek PM?",
    ans:"10", unit:"cm", exp:"PM = PQ ÷ 2 = 20 ÷ 2 = 10 cm. Punkt M to środek odcinka PQ." },

  { cat:"📏 Odcinki", type:"choice",
    q:"Odcinek AB = 15 cm, a odcinek CD = 9 cm.\nO ile centymetrów AB jest dłuższy od CD?",
    opts:["4 cm","5 cm","6 cm","7 cm"],
    ans:2, exp:"15 − 9 = 6 cm. Odcinek AB jest dłuższy o 6 cm." },

  { cat:"📏 Odcinki", type:"input",
    q:"Trzy odcinki leżą na jednej prostej:\nAB = 7 cm, BC = 5 cm, CD = 8 cm.\nIle wynosi cały odcinek AD?",
    ans:"20", unit:"cm", exp:"AD = AB + BC + CD = 7 + 5 + 8 = 20 cm" },

  { cat:"📏 Odcinki", type:"choice",
    q:"Odcinek XY = 3 dm 5 cm. Ile to centymetrów?",
    opts:["35 cm","38 cm","305 cm","53 cm"],
    ans:0, exp:"3 dm = 30 cm, więc 3 dm 5 cm = 30 + 5 = 35 cm." },

  { cat:"📏 Odcinki", type:"choice",
    q:"Odcinek PQ = 4 dm 2 cm, odcinek RS = 38 cm.\nKtóry odcinek jest dłuższy i o ile?",
    opts:["PQ jest dłuższy o 4 cm","RS jest dłuższy o 4 cm","Są równe","PQ jest dłuższy o 2 cm"],
    ans:0, exp:"PQ = 4 dm 2 cm = 42 cm. RS = 38 cm. 42 − 38 = 4 cm. PQ jest dłuższy." },

  { cat:"📏 Odcinki", type:"choice",
    q:"Odcinek AB = 30 cm. Punkt C dzieli AB tak, że AC : CB = 1 : 2.\nIle wynosi odcinek AC?",
    opts:["8 cm","10 cm","12 cm","15 cm"],

// ============================================================
// GAME STATE
// ============================================================
let G = { pool:[], cur:0, score:0, streak:0, maxStreak:0, correct:0, wrong:0, answered:false };

// ============================================================
// INIT
// ============================================================
(function init(){
  const bg = document.getElementById('shapesBg');
  const syms = ['▲','●','■','⬟','◆','⊥','∥','📐','📏','📍'];
  for(let i=0;i<16;i++){
    const el=document.createElement('div');
    el.className='shape';
    el.textContent=syms[Math.floor(Math.random()*syms.length)];
    el.style.cssText=`left:${Math.random()*100}%;font-size:${18+Math.random()*38}px;animation-duration:${9+Math.random()*16}s;animation-delay:${-Math.random()*25}s;color:hsl(${Math.random()*360},65%,65%);`;
    bg.appendChild(el);
  }
})();

// ============================================================
// START / RESTART
// ============================================================
function startGame(){
  G.pool=[...QS].sort(()=>Math.random()-.5);
  G.cur=0; G.score=0; G.streak=0; G.maxStreak=0; G.correct=0; G.wrong=0;
  show('gameScreen'); hide('startScreen');
  loadQ();
}
function restartGame(){
  hide('resultsScreen'); show('startScreen');
}

// ============================================================
// LOAD QUESTION
// ============================================================
function loadQ(){
  const q=G.pool[G.cur];
  G.answered=false;

  // header
  document.getElementById('scoreDisp').textContent=G.score;
  document.getElementById('streakBox').textContent=`🔥 ${G.streak}`;
  const pct=(G.cur/G.pool.length)*100;
  document.getElementById('progFill').style.width=pct+'%';
  document.getElementById('progLbl').textContent=`${G.cur}/${G.pool.length}`;
  document.getElementById('qNum').textContent=`${G.cur+1}/${G.pool.length}`;

  // card re-animation
  const card=document.getElementById('qcard');
  card.style.animation='none'; card.offsetHeight; card.style.animation='cardIn .4s cubic-bezier(.34,1.56,.64,1)';

  document.getElementById('catBadge').textContent=q.cat;
  document.getElementById('qText').textContent=q.q;

  // feedback hidden
  const fb=document.getElementById('fbBox');
  fb.style.display='none'; fb.className='fb-box';
  document.getElementById('btnNext').style.display='none';

  // canvas
  const cw=document.getElementById('canvasWrap');
  if(q.type==='canvas'){
    cw.style.display='flex';
    setTimeout(()=>drawQ(q.ctype),30);
  } else {
    cw.style.display='none';
  }

  // answers
  const area=document.getElementById('answersArea');
  if(q.type==='choice'||q.type==='canvas') area.innerHTML=renderChoices(q);
  else if(q.type==='truefalse') area.innerHTML=renderTF();
  else if(q.type==='input') area.innerHTML=renderInput(q);
}

function renderChoices(q){
  const L=['A','B','C','D'];
  return `<div class="opts-grid">`+q.opts.map((o,i)=>
    `<button class="opt-btn" onclick="checkChoice(${i})"><span class="opt-letter">${L[i]}</span>${o}</button>`
  ).join('')+`</div>`;
}
function renderTF(){
  return `<div class="tf-grid">
    <button class="tf-btn tbtn" onclick="checkTF(true)">✅ PRAWDA</button>
    <button class="tf-btn fbtn" onclick="checkTF(false)">❌ FAŁSZ</button>
  </div>`;
}
function renderInput(q){
  return `<div class="inp-row">
    <input type="number" class="ans-inp" id="aInp" placeholder="Wpisz liczbę…"
      onkeydown="if(event.key==='Enter')checkInput()">
    ${q.unit?`<span class="unit-lbl">${q.unit}</span>`:''}
    <button class="btn-check" onclick="checkInput()">Sprawdź ✓</button>
  </div>`;
}

// ============================================================
// CHECK ANSWERS
// ============================================================
function checkChoice(idx){
  if(G.answered) return;
  const q=G.pool[G.cur];
  const btns=document.querySelectorAll('.opt-btn');
  btns.forEach(b=>b.disabled=true);
  btns[idx].classList.add(idx===q.ans?'correct':'wrong');
  if(idx!==q.ans) btns[q.ans].classList.add('correct');
  idx===q.ans?onRight():onWrong();
  showFB(idx===q.ans, q.exp);
}
function checkTF(val){
  if(G.answered) return;
  const q=G.pool[G.cur];
  const btns=document.querySelectorAll('.tf-btn');
  btns.forEach(b=>b.disabled=true);
  const ok=(val===q.ans);
  if(val){ btns[0].classList.add(ok?'correct':'wrong'); if(!ok) btns[1].classList.add('correct'); }
  else   { btns[1].classList.add(ok?'correct':'wrong'); if(!ok) btns[0].classList.add('correct'); }
  ok?onRight():onWrong();
  showFB(ok, q.exp);
}
function checkInput(){
  if(G.answered) return;
  const q=G.pool[G.cur];
  const inp=document.getElementById('aInp');
  if(!inp.value.trim()) return;
  const ok=(inp.value.trim()===q.ans);
  inp.classList.add(ok?'correct':'wrong');
  inp.disabled=true;
  document.querySelector('.btn-check').disabled=true;
  ok?onRight():onWrong();
  showFB(ok, q.exp);
}

function onRight(){
  G.answered=true; G.correct++; G.streak++;
  G.maxStreak=Math.max(G.maxStreak,G.streak);
  let pts=10;
  if(G.streak>=3) pts=15;
  if(G.streak>=5) pts=20;
  G.score+=pts;
  document.getElementById('scoreDisp').textContent=G.score;
  document.getElementById('streakBox').textContent=`🔥 ${G.streak}`;
  confetti();
  showNext();
}
function onWrong(){
  G.answered=true; G.wrong++; G.streak=0;
  document.getElementById('streakBox').textContent=`🔥 0`;
  showNext();
}

function showFB(ok, exp){
  const msgs = ok
    ? ['🎉 Brawo! Świetna odpowiedź!','⭐ Doskonale! Tak trzymaj!','🔥 Fantastycznie!','💪 Jesteś geniuszem!','✨ Idealnie!']
    : ['😅 Nie tym razem…','🤔 Prawie! Warto zapamiętać.','💡 Spróbuj jeszcze raz następnym razem!'];
  const fb=document.getElementById('fbBox');
  fb.style.display='block';
  fb.className=`fb-box ${ok?'correct':'wrong'}`;
  document.getElementById('fbTitle').textContent=msgs[Math.floor(Math.random()*msgs.length)];
  document.getElementById('fbText').textContent=`💡 ${exp}`;
}
function showNext(){
  const btn=document.getElementById('btnNext');
  btn.style.display='block';
  btn.textContent=(G.cur>=G.pool.length-1)?'🏁 Zobacz wyniki!':'Następne pytanie ➡️';
}
function nextQ(){
  G.cur++;
  if(G.cur>=G.pool.length) showResults();
  else loadQ();
}

// ============================================================
// CANVAS DRAWING
// ============================================================
function drawQ(type){
  const cv=document.getElementById('qCanvas');
  const ctx=cv.getContext('2d');
  const W=cv.width, H=cv.height;
  ctx.clearRect(0,0,W,H);
  // grid bg
  ctx.strokeStyle='rgba(167,139,250,.07)'; ctx.lineWidth=1;
  for(let x=0;x<=W;x+=25){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<=H;y+=25){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}

  if(type==='perp')   drawPerp(ctx,W,H);
  else if(type==='para')   drawPara(ctx,W,H);
  else if(type==='angles') drawAngles(ctx,W,H);
  else if(type==='segs')   drawSegs(ctx,W,H);
}

function lbl(ctx,t,x,y,c='#ffd700'){
  ctx.save();
  ctx.font='bold 15px "Baloo 2",cursive';
  ctx.fillStyle=c; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(t,x,y); ctx.restore();
}
function line(ctx,x1,y1,x2,y2,c='#a78bfa',w=2.5){
  ctx.save(); ctx.strokeStyle=c; ctx.lineWidth=w; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke(); ctx.restore();
}

function drawPerp(ctx,W,H){
  // line a – horizontal mid
  line(ctx, 40,H/2, W-40,H/2, '#26e5d5', 3);
  lbl(ctx,'a', W-24, H/2-18, '#26e5d5');

  // line b – vertical through ~W/2, perpendicular
  line(ctx, W/2, 22, W/2, H-22, '#ff6eb4', 3);
  lbl(ctx,'b', W/2+20, 38, '#ff6eb4');

  // right-angle mark
  ctx.save(); ctx.strokeStyle='#ffd700'; ctx.lineWidth=2;
  const s=14, cx=W/2, cy=H/2;
  ctx.beginPath(); ctx.moveTo(cx+s,cy); ctx.lineTo(cx+s,cy-s); ctx.lineTo(cx,cy-s); ctx.stroke();
  ctx.restore();

  // line c – diagonal
  line(ctx, 50, 28, W-50, H-28, '#a78bfa', 3);
  lbl(ctx,'c', W-38, H-22, '#a78bfa');
}

function drawPara(ctx,W,H){
  // arrows
  function arrowHead(ctx,x,y,c){
    ctx.save(); ctx.fillStyle=c;
    ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(x-12,y-6); ctx.lineTo(x-12,y+6); ctx.closePath(); ctx.fill();
    ctx.restore();
  }
  // line p – horizontal top
  line(ctx, 40, 75, W-40, 75, '#26e5d5', 3);
  arrowHead(ctx, W-40, 75, '#26e5d5');
  lbl(ctx,'p', W-22, 75, '#26e5d5');

  // line q – horizontal middle
  line(ctx, 40, 145, W-40, 145, '#ff6eb4', 3);
  arrowHead(ctx, W-40, 145, '#ff6eb4');
  lbl(ctx,'q', W-22, 145, '#ff6eb4');

  // parallel tick marks (double for both lines)
  ctx.save(); ctx.strokeStyle='#ffd700'; ctx.lineWidth=2;
  [[W/2-12,75],[W/2+2,75],[W/2-12,145],[W/2+2,145]].forEach(([x,y])=>{
    ctx.beginPath(); ctx.moveTo(x,y-9); ctx.lineTo(x,y+9); ctx.stroke();
  });
  ctx.restore();

  // line r – diagonal
  line(ctx, 70, 22, W-70, H-22, '#a78bfa', 3);
  lbl(ctx,'r', W-58, H-18, '#a78bfa');
}

function drawAngles(ctx,W,H){
  const RAD=r=>r*Math.PI/180;
  const L=80;
  function drawAngle(vx,vy,a1,a2,c,label,isRight){
    ctx.save(); ctx.strokeStyle=c; ctx.lineWidth=2.5; ctx.lineCap='round';
    // ray 1
    ctx.beginPath(); ctx.moveTo(vx,vy);
    ctx.lineTo(vx+L*Math.cos(RAD(a1)),vy+L*Math.sin(RAD(a1))); ctx.stroke();
    // ray 2
    ctx.beginPath(); ctx.moveTo(vx,vy);
    ctx.lineTo(vx+L*Math.cos(RAD(a2)),vy+L*Math.sin(RAD(a2))); ctx.stroke();
    // arc or right-angle square
    if(isRight){
      const s=16;
      const r1=RAD(a1); const r2=RAD(a2);
      const p1x=vx+s*Math.cos(r1), p1y=vy+s*Math.sin(r1);
      const p2x=vx+s*Math.cos(r2), p2y=vy+s*Math.sin(r2);
      const mx=p1x+p2x-vx, my=p1y+p2y-vy;
      ctx.beginPath(); ctx.moveTo(p1x,p1y); ctx.lineTo(mx,my); ctx.lineTo(p2x,p2y); ctx.stroke();
    } else {
      ctx.beginPath();
      ctx.arc(vx,vy,26, RAD(a2)<RAD(a1)?RAD(a2):RAD(a1), RAD(a2)<RAD(a1)?RAD(a1):RAD(a2));
      ctx.stroke();
    }
    lbl(ctx,label,vx+45,vy-28,c); ctx.restore();
  }

  // A – acute ~35°, top-left
  drawAngle(90, 165, 0, -35, '#26e5d5', 'A', false);
  // B – right 90°, top-right
  drawAngle(330, 165, 0, -90, '#ffd700', 'B', true);
  // C – obtuse ~130°, bottom-left
  drawAngle(90, 230, 0, -130, '#ff6eb4', 'C', false);
  // D – acute ~60°, bottom-right
  drawAngle(330, 230, 0, -60, '#a78bfa', 'D', false);
}

function drawSegs(ctx,W,H){
  function seg(x1,y,len,c,la,lb){
    ctx.save(); ctx.strokeStyle=c; ctx.lineWidth=4; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(x1,y); ctx.lineTo(x1+len,y); ctx.stroke();
    ctx.fillStyle=c;
    ctx.beginPath(); ctx.arc(x1,y,5,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(x1+len,y,5,0,Math.PI*2); ctx.fill();
    ctx.restore();
    lbl(ctx,la, x1-12, y, c);
    lbl(ctx,lb, x1+len+12, y, c);
  }
  seg(55,  75, 145, '#26e5d5', 'A','B');   // medium
  seg(55, 145, 250, '#ffd700', 'C','D');   // longest
  seg(55, 215,  90, '#ff6eb4', 'E','F');   // shortest
}

// ============================================================
// CONFETTI
// ============================================================
function confetti(){
  const cols=['#ffd700','#ff6eb4','#26e5d5','#a78bfa','#34d399','#fb923c'];
  for(let i=0;i<24;i++){
    setTimeout(()=>{
      const el=document.createElement('div');
      el.className='cf';
      el.style.cssText=`left:${Math.random()*100}%;top:0;background:${cols[Math.floor(Math.random()*cols.length)]};width:${6+Math.random()*10}px;height:${6+Math.random()*10}px;border-radius:${Math.random()>.5?'50%':'2px'};animation-duration:${.9+Math.random()*.8}s;animation-delay:${Math.random()*.25}s;`;
      document.body.appendChild(el);
      setTimeout(()=>el.remove(),2200);
    },i*28);
  }
}

// ============================================================
// RESULTS
// ============================================================
function showResults(){
  hide('gameScreen'); show('resultsScreen');
  const tot=G.pool.length;
  const acc=Math.round((G.correct/tot)*100);
  document.getElementById('resBigScore').textContent=`${G.score} pkt`;
  document.getElementById('resCorrect').textContent=G.correct;
  document.getElementById('resWrong').textContent=G.wrong;
  document.getElementById('resAcc').textContent=`${acc}%`;

  let trophy,title,stars,msg;
  if(acc>=90){
    trophy='🏆'; title='Mistrz Geometrii!'; stars='⭐⭐⭐';
    msg='Niesamowite! Jesteś prawdziwym ekspertem od prostych i odcinków! Klasa 4 to dla Ciebie żaden problem!';
  } else if(acc>=70){
    trophy='🥈'; title='Świetna robota!'; stars='⭐⭐';
    msg='Bardzo dobrze! Jeszcze trochę ćwiczeń z prostymi prostopadłymi i równoległymi, a będziesz mistrzem!';
  } else if(acc>=50){
    trophy='🥉'; title='Dobry start!'; stars='⭐';
    msg='Niezły wynik! Powtórz prostopadłe i równoległe – masz już solidne podstawy!';
  } else {
    trophy='📚'; title='Warto poćwiczyć!'; stars='💪';
    msg='Nie przejmuj się! Poczytaj o prostych i odcinkach, a następnym razem pójdzie Ci o wiele lepiej!';
  }
  document.getElementById('resTrophy').textContent=trophy;
  document.getElementById('resTitle').textContent=title;
  document.getElementById('resStars').textContent=stars;
  document.getElementById('resMsg').textContent=msg;
  if(acc>=70) for(let i=0;i<4;i++) setTimeout(confetti,i*550);
}

// ============================================================
// HELPERS
// ============================================================
function show(id){ document.getElementById(id).classList.remove('hidden'); }
function hide(id){ document.getElementById(id).classList.add('hidden'); }
</script>
